frr version 7.5.1_git
frr defaults traditional
hostname router5
no ipv6 forwarding
!
interface eth1
 ip address 10.0.115.5/24
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 frr_deamon
!
interface eth2
 ip address 10.0.125.5/24
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 frr_deamon
!
interface eth3
 ip address 192.168.1.1/24
!
interface lo
 ip address 192.168.10.5/32
!
router ospf
 redistribute connected
 network 10.0.115.0/24 area 1
 network 10.0.125.0/24 area 1
 network 192.168.10.0/32 area 1
 area 1 authentication message-digest
 area 1 nssa 
 area 1 nssa no-summary
!
line vty
!
